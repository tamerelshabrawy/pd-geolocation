<!doctype html>
<html lang="en">
    <head>
        <title>Pd4Web</title>
        <meta charset="UTF-8" />
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <script src="./pd4web.threads.js"></script>
        <script src="./pd4web.js"></script>
        <style>
            :root { --bg: #fff; --fg: #111; --accent: #1a73e8; --panel: rgba(0,0,0,0.72); }
            @media (prefers-color-scheme: dark) {
                :root { --bg: #303030; --fg: #eee; }
                .pd4web-sound-switch { filter: invert(1); }
            }
            *, *::before, *::after { box-sizing: border-box; }
            body { margin: 0; background: var(--bg); font-family: system-ui, sans-serif; touch-action: pan-x pan-y; }

            /* ── wasm loader ── */
            #wasm-loader {
                position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
                display: flex; flex-direction: column; align-items: center; gap: 8px;
                background: rgba(0,0,0,0.08); padding: 16px 20px; border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 1000;
            }
            #status { font-size: 12px; color: var(--fg); }
            #progress { width: 200px; height: 8px; border-radius: 4px; }

            /* ── pd canvas ── */
            .pd4web-sound-switch { display: flex; justify-content: center; align-items: center; width: 32px; height: 32px; margin: 8px auto; }
            .pd4web-patch-canvas { display: block; margin: 8px auto; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
            .pd4web-patch-canvas:focus { outline: 2px solid var(--accent); }

            /* ── GPS status pill ── */
            #gps-pill {
                position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%);
                background: var(--panel); color: #fff; font-size: 12px; font-weight: 600;
                padding: 7px 16px; border-radius: 24px; z-index: 900;
                pointer-events: none; white-space: nowrap; letter-spacing: 0.3px;
                transition: background 0.3s;
            }
            #gps-pill.inside  { background: rgba(22,160,60,0.88); }
            #gps-pill.outside { background: rgba(0,0,0,0.72); }
            #gps-pill.error   { background: rgba(200,40,40,0.88); }

            /* ── Debug panel ── */
            #debug-panel {
                position: fixed; bottom: 0; left: 0; right: 0;
                background: var(--panel); color: #fff;
                padding: 12px 16px 20px; z-index: 950;
                display: flex; flex-direction: column; gap: 10px;
            }
            #debug-panel h3 {
                margin: 0; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
                color: #aaa; display: flex; justify-content: space-between; align-items: center;
            }
            #debug-panel h3 span { color: #fff; font-size: 13px; }

            /* mode toggle */
            #mode-row { display: flex; gap: 8px; align-items: center; }
            .mode-btn {
                flex: 1; padding: 7px 0; border: none; border-radius: 8px;
                font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
            }
            .mode-btn.active { opacity: 1; }
            .mode-btn.inactive { opacity: 0.35; }
            #btn-gps  { background: #1a73e8; color: #fff; }
            #btn-sim  { background: #f9a825; color: #111; }

            /* zone slider */
            #slider-row { display: flex; flex-direction: column; gap: 6px; }
            #slider-row label { font-size: 11px; color: #ccc; display: flex; justify-content: space-between; }
            #slider-row label span { color: #fff; font-size: 14px; font-weight: 800; }
            #zone-slider {
                width: 100%; -webkit-appearance: none; appearance: none;
                height: 6px; border-radius: 3px; background: #555; outline: none;
            }
            #zone-slider::-webkit-slider-thumb {
                -webkit-appearance: none; width: 22px; height: 22px;
                border-radius: 50%; background: #f9a825; cursor: pointer;
                box-shadow: 0 0 6px rgba(0,0,0,0.5);
            }
            #zone-slider:disabled { opacity: 0.3; pointer-events: none; }

            /* zone row buttons */
            #zone-btns {
                display: flex; flex-wrap: wrap; gap: 4px;
            }
            .z-btn {
                flex: 0 0 calc(14.28% - 4px); padding: 5px 0;
                border: none; border-radius: 5px; font-size: 10px; font-weight: 700;
                background: #444; color: #ccc; cursor: pointer; text-align: center;
                transition: background 0.15s, color 0.15s;
            }
            .z-btn:disabled { opacity: 0.25; pointer-events: none; }
            .z-btn.active { background: #f9a825; color: #111; }

            /* log */
            #pd-log {
                font-size: 10px; color: #7f8; background: rgba(0,0,0,0.4);
                border-radius: 6px; padding: 6px 8px; max-height: 52px; overflow-y: auto;
                font-family: monospace; white-space: pre-wrap;
            }
        </style>
    </head>
    <body>

        <!-- WASM loader -->
        <div id="wasm-loader">
            <span id="status">Loading patch…</span>
            <progress id="progress" value="0" max="100"></progress>
        </div>

        <!-- pd4web controls -->
        <span class="pd4web-sound-switch" id="Pd4WebAudioSwitch"></span>
        <canvas tabindex="0" class="pd4web-patch-canvas" id="Pd4WebCanvas"></canvas>

        <!-- GPS status pill -->
        <div id="gps-pill" class="outside">📍 Waiting for GPS…</div>

        <!-- Debug / Simulation panel -->
        <div id="debug-panel">
            <h3>🎛 Zone Control &nbsp;<span id="debug-mode-label">GPS MODE</span></h3>

            <div id="mode-row">
                <button class="mode-btn active" id="btn-gps"  onclick="setMode('gps')">📡 Real GPS</button>
                <button class="mode-btn inactive" id="btn-sim" onclick="setMode('sim')">🎚 Simulate</button>
            </div>

            <div id="slider-row">
                <label>Zone <span id="zone-label">—</span></label>
                <input type="range" id="zone-slider" min="1" max="35" step="1" value="1" disabled
                       oninput="onSliderInput(this.value)" />
            </div>

            <div id="zone-btns"></div>

            <div id="pd-log">— patch log —</div>
        </div>

        <!-- ═══════════════════════════════════════════════════════════════ -->
        <!--  GEOLOCATION + PD BRIDGE                                       -->
        <!-- ═══════════════════════════════════════════════════════════════ -->
        <script>
        // ── Route borders (from geo-gps/data/alexandria_pedestrian_route.geojson) ──
        // [longitude, latitude]
        const OUTER_BORDER = [
            [29.8985742,31.2008868],[29.8990142,31.199963],[29.8990518,31.1999074],
            [29.8991099,31.1998557],[29.899243,31.1997604],[29.8994968,31.1995653],
            [29.9002479,31.1980143],[29.9006458,31.1971429],[29.9009235,31.19653],
            [29.9010238,31.1962815],[29.9011116,31.1960526],[29.9011711,31.1959355],
            [29.9023496,31.1963765],[29.9042378,31.1970997],[29.9045246,31.1972019],
            [29.9047666,31.1973246],[29.9035848,31.1982192],[29.9025919,31.1990843],
            [29.902556,31.1991073],[29.9007485,31.200883],[29.9004258,31.2011948],
            [29.9000345,31.2015219],[29.8997148,31.2018949],[29.8987045,31.2014517],
            [29.8982799,31.2012772],[29.898292,31.2010923],[29.8984827,31.2009557],
            [29.8985562,31.2009262],[29.8985764,31.2008867]
        ];
        const INNER_BORDER = [
            [29.9042715,31.1971886],[29.9040266,31.1970967],[29.9038177,31.1970196],
            [29.9035612,31.1969195],[29.9032994,31.1968217],[29.9030252,31.1967192],
            [29.9026919,31.1965935],[29.90116,31.1960329],[29.9011093,31.1961634],
            [29.9010739,31.1962588],[29.9010204,31.1963777],[29.9009838,31.1964567],
            [29.9009196,31.1966127],[29.9008214,31.1968278],[29.900729,31.197033],
            [29.9005354,31.197452],[29.9004363,31.1976696],[29.9003473,31.1978637],
            [29.9002448,31.1980737],[29.9000878,31.1984075],[29.8995214,31.199621],
            [29.8993131,31.1997794],[29.8991065,31.1999369],[29.899022,31.2001435],
            [29.8988634,31.2004477],[29.8985785,31.2010352],[29.8988268,31.2011214],
            [29.8992918,31.2012976],[29.8995806,31.201405],[29.8996133,31.2010997],
            [29.9003518,31.2009563],[29.900595,31.2007425],[29.9008607,31.2005171],
            [29.9011287,31.200284],[29.9013854,31.2000587],[29.9015999,31.1998636],
            [29.9019591,31.1995458],[29.9019591,31.1995458],[29.9022687,31.1992511],
            [29.9025586,31.1989869],[29.9026791,31.1988579],[29.902781,31.1987394],
            [29.9029072,31.1985722],[29.9030305,31.1984446],[29.9032732,31.1982327],
            [29.9034668,31.1981114],[29.9035805,31.1980146],[29.9037191,31.197871],
            [29.903924,31.1976572],[29.9041345,31.1974428],[29.9042697,31.1971939],
            [29.9042702,31.1971939]
        ];

        // Build zone polygon: outer → reversed inner → close
        const ZONE_POLYGON = OUTER_BORDER
            .concat(INNER_BORDER.slice().reverse())
            .concat([OUTER_BORDER[0]]);

        // Ray-casting point-in-polygon
        function pointInPolygon(lon, lat, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i][0], yi = poly[i][1];
                const xj = poly[j][0], yj = poly[j][1];
                if (((yi > lat) !== (yj > lat)) &&
                    (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi))
                    inside = !inside;
            }
            return inside;
        }

        // Project lon/lat onto polyline → 0..1 progress
        function projectOntoPolyline(lon, lat, line) {
            const segs = [];
            let total = 0;
            for (let i = 0; i < line.length - 1; i++) {
                const dx = line[i+1][0]-line[i][0], dy = line[i+1][1]-line[i][1];
                const len = Math.sqrt(dx*dx + dy*dy);
                segs.push(len);
                total += len;
            }
            let best = Infinity, bestAccum = 0, accum = 0;
            for (let i = 0; i < line.length - 1; i++) {
                const ax=line[i][0], ay=line[i][1], bx=line[i+1][0], by=line[i+1][1];
                const dx=bx-ax, dy=by-ay, lenSq=dx*dx+dy*dy;
                let t = lenSq > 0 ? Math.max(0,Math.min(1,((lon-ax)*dx+(lat-ay)*dy)/lenSq)) : 0;
                const px=ax+t*dx, py=ay+t*dy;
                const d=(lon-px)*(lon-px)+(lat-py)*(lat-py);
                if (d < best) { best=d; bestAccum=accum+t*segs[i]; }
                accum += segs[i];
            }
            return total > 0 ? bestAccum / total : 0;
        }

        // 0..1 → zone 1..35
        function progressToZone(p) {
            return Math.min(35, Math.max(1, Math.round(p * 34) + 1));
        }

        // ── UI state ──────────────────────────────────────────────────────
        let MODE       = 'gps';   // 'gps' | 'sim'
        let PD4WEB     = null;
        let GEO_WATCH  = null;
        let lastZone   = 0;

        const pill      = document.getElementById('gps-pill');
        const slider    = document.getElementById('zone-slider');
        const zoneLabel = document.getElementById('zone-label');
        const modeLabel = document.getElementById('debug-mode-label');
        const pdLog     = document.getElementById('pd-log');
        const btnGps    = document.getElementById('btn-gps');
        const btnSim    = document.getElementById('btn-sim');

        // ── Build zone buttons 1..35 ──────────────────────────────────────
        const zbtnsContainer = document.getElementById('zone-btns');
        for (let z = 1; z <= 35; z++) {
            const b = document.createElement('button');
            b.className = 'z-btn';
            b.id = 'zb-' + z;
            b.textContent = z;
            b.disabled = true;
            b.onclick = () => sendZone(z, 'btn');
            zbtnsContainer.appendChild(b);
        }

        // ── Log helper ────────────────────────────────────────────────────
        function log(msg) {
            const now = new Date().toLocaleTimeString('en',{hour12:false});
            pdLog.textContent = `[${now}] ${msg}\n` + pdLog.textContent.slice(0, 400);
        }

        // ── Send zone to pd ───────────────────────────────────────────────
        function sendZone(z, source) {
            z = Math.min(35, Math.max(1, Math.round(z)));
            if (!PD4WEB) { log('⚠ pd not ready yet'); return; }
            PD4WEB.sendFloat('zone', z);
            // Highlight active button
            document.querySelectorAll('.z-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('zb-' + z);
            if (activeBtn) activeBtn.classList.add('active');
            // Sync slider
            slider.value = z;
            zoneLabel.textContent = z;
            lastZone = z;
            log(`→ zone ${z}  [${source}]`);
        }

        // ── Slider input ──────────────────────────────────────────────────
        function onSliderInput(val) {
            if (MODE !== 'sim') return;
            sendZone(parseInt(val), 'slider');
        }

        // ── Mode toggle ───────────────────────────────────────────────────
        function setMode(mode) {
            MODE = mode;
            if (mode === 'sim') {
                modeLabel.textContent = 'SIMULATE MODE';
                btnGps.classList.replace('active','inactive');
                btnSim.classList.replace('inactive','active');
                slider.disabled = false;
                document.querySelectorAll('.z-btn').forEach(b => b.disabled = false);
                pill.className = 'outside';
                pill.textContent = '🎚 Simulation — drag slider or tap zone';
                // Stop GPS watch to save battery
                if (GEO_WATCH !== null) { navigator.geolocation.clearWatch(GEO_WATCH); GEO_WATCH = null; }
                // Immediately send current slider value
                sendZone(parseInt(slider.value), 'mode-switch');
                log('🎚 Switched to SIMULATE mode');
            } else {
                modeLabel.textContent = 'GPS MODE';
                btnSim.classList.replace('active','inactive');
                btnGps.classList.replace('inactive','active');
                slider.disabled = true;
                document.querySelectorAll('.z-btn').forEach(b => b.disabled = true);
                document.querySelectorAll('.z-btn').forEach(b => b.classList.remove('active'));
                pill.className = 'outside';
                pill.textContent = '📍 Acquiring GPS…';
                if (PD4WEB) startGeolocation(PD4WEB);
                log('📡 Switched to GPS mode');
            }
        }

        // ── Geolocation ───────────────────────────────────────────────────
        function startGeolocation(pd) {
            if (!('geolocation' in navigator)) {
                pill.className = 'error';
                pill.textContent = '⚠️ GPS not available';
                log('⚠ GPS API not available in this browser');
                return;
            }
            if (GEO_WATCH !== null) navigator.geolocation.clearWatch(GEO_WATCH);
            GEO_WATCH = navigator.geolocation.watchPosition(
                (pos) => {
                    if (MODE !== 'gps') return;
                    const lon = pos.coords.longitude;
                    const lat = pos.coords.latitude;
                    const acc = Math.round(pos.coords.accuracy);
                    const inside = pointInPolygon(lon, lat, ZONE_POLYGON);
                    if (inside) {
                        const progress = projectOntoPolyline(lon, lat, INNER_BORDER);
                        const zone = progressToZone(progress);
                        pd.sendFloat('zone', zone);
                        // Sync UI
                        slider.value = zone;
                        zoneLabel.textContent = zone;
                        document.querySelectorAll('.z-btn').forEach(b => b.classList.remove('active'));
                        const ab = document.getElementById('zb-' + zone);
                        if (ab) ab.classList.add('active');
                        pill.className = 'inside';
                        pill.textContent = `✅ Zone ${zone}/35  ±${acc}m`;
                        if (zone !== lastZone) { log(`📍 GPS → zone ${zone}  ±${acc}m`); lastZone = zone; }
                    } else {
                        pd.sendFloat('zone', 0);
                        pill.className = 'outside';
                        pill.textContent = `🚶 Outside route  ±${acc}m`;
                        if (lastZone !== 0) { log(`🚶 Outside route  ±${acc}m`); lastZone = 0; }
                    }
                },
                (err) => {
                    pill.className = 'error';
                    pill.textContent = `⚠️ GPS: ${err.message}`;
                    log(`⚠ GPS error (${err.code}): ${err.message}`);
                },
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
            );
        }
        </script>

        <!-- ── Boot pd4web then wire everything ── -->
        <script>
            const statusElement   = document.getElementById('status');
            const progressElement = document.getElementById('progress');

            function fetchWithProgress(url) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', url, true);
                    xhr.responseType = 'arraybuffer';
                    xhr.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const pct = Math.floor((e.loaded / e.total) * 100);
                            progressElement.value = pct;
                            statusElement.textContent = `Loading patch… ${pct}%`;
                        }
                    };
                    xhr.onload = () => xhr.status === 200
                        ? resolve(xhr.response)
                        : reject(new Error(`HTTP ${xhr.status}`));
                    xhr.onerror = () => reject(new Error('Network error'));
                    xhr.send();
                });
            }

            fetchWithProgress('./pd4web.wasm')
                .then((buf) => Pd4WebModule({ wasmBinary: buf }))
                .then((Mod) => {
                    PD4WEB = new Mod.Pd4Web();
                    PD4WEB.openPatch('index.pd', {
                        canvasId: 'Pd4WebCanvas',
                        soundToggleId: 'Pd4WebAudioSwitch',
                    });
                    document.getElementById('wasm-loader').style.display = 'none';
                    log('✅ Patch loaded — pd4web ready');

                    // Boot in GPS mode by default
                    setMode('gps');
                    startGeolocation(PD4WEB);
                })
                .catch((err) => {
                    statusElement.textContent = 'Failed to load patch.';
                    log('❌ ' + err.message);
                    console.error(err);
                });
        </script>
    </body>
</html>
